# tmux-retro-status.conf — a theme-following tmux status line.
#
# The stock airline footer pins every color to the fixed 256-cube
# (colour236 / colour31 / colour214 …), so it looks identical under every retro
# profile. This version draws ONLY from ANSI palette slots 0–15, which each
# retro-terminals profile redefines — so the status bar re-colors to match
# whichever machine the window is running, automatically, with zero per-profile
# config. Monochrome profiles (Green/Amber phosphor) render a monochrome bar;
# 16-color profiles (C64, VGA) render a colorful one. That's the point.
#
# It themes the whole tmux surface — status bar, window tabs, pane borders,
# copy mode and the clock — all from palette slots, not just the footer.
#
# Slot legend (what each machine's palette provides):
#   0  darkest / background        8  "bright black" — the status-bar grey
#   3  yellow  (accent)           11  bright yellow (hot accent)
#   4  blue    (session block)     7  light / foreground
#   15 brightest white
#
# Enable it by sourcing this file AFTER your own status block, so it wins.
# Best on a multi-machine setup: put the line in a NON-synced machine-local
# include (many configs already source ~/.tmux.conf.local at the end):
#   source-file ~/Desktop/notebook/code/retro-terminals/integration/tmux-retro-status.conf
# then:  tmux source-file ~/.tmux.conf   (or restart tmux)
# Revert by deleting that one line. Nothing here is destructive.

set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-justify left

# base bar: theme grey (slot 8) with light text (slot 7)
set -g status-style "bg=colour8,fg=colour7"
set -g message-style "bg=colour4,fg=colour15,bold"
set -g mode-style    "bg=colour3,fg=colour0,bold"

set -g status-left-length 80
set -g status-left "#[bg=colour4,fg=colour15,bold] #S #[bg=colour8,fg=colour7] #{pane_current_command} #[default]"

set -g status-right-length 96
set -g status-right "#[bg=colour8,fg=colour7] #H #[bg=colour4,fg=colour15,bold] %H:%M #[default]"

set -g window-status-separator ""
set -g window-status-format "#[bg=colour8,fg=colour7] #I:#W #[fg=colour8]"
set -g window-status-current-format "#[bg=colour3,fg=colour0,bold] #I:#W #[bg=colour8,fg=colour3]"
set -g window-status-activity-style "fg=colour3"

# The theme isn't just the status bar — pane borders, copy mode and the clock
# all draw from palette slots too, so the whole tmux surface wears the profile.
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"
set -g message-command-style "bg=colour4,fg=colour15,bold"
set -g clock-mode-colour colour4
set -g copy-mode-match-style "bg=colour3,fg=colour0"
set -g copy-mode-current-match-style "bg=colour11,fg=colour0"

# keep your pane-focus refresh, now palette-relative
set-hook -g pane-focus-in 'set -g status-left "#[bg=colour4,fg=colour15,bold] #S #[bg=colour8,fg=colour7] #{pane_current_command} #[default]"'
